name: Backend Monorepo Checks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'backend-api/**'
      - '.github/workflows/backend-monorepo-checks.yml'
      - '.github/workflows/backend-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'backend-api/**'
      - '.github/workflows/backend-monorepo-checks.yml'
      - '.github/workflows/backend-validation.yml'

concurrency:
  group: backend-monorepo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP syntax check
        run: |
          find app routes config database -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Today readiness guardrail
        run: composer today:ready
