name: Ops Triage Assistant

on:
  workflow_run:
    workflows:
      - DevSecOps E2E Gate
      - Staging Deploy
      - CodeQL Analysis
      - Production Deploy (Guarded)
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  triage:
    name: Generate Ops Triage Summary
    if: github.event.workflow_run.conclusion != 'success' && github.event.workflow_run.conclusion != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Build triage report
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runId = context.payload.workflow_run.id;
            const runName = context.payload.workflow_run.name;
            const runConclusion = context.payload.workflow_run.conclusion;
            const headSha = context.payload.workflow_run.head_sha;
            const headBranch = context.payload.workflow_run.head_branch;
            const runUrl = context.payload.workflow_run.html_url;

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner,
              repo,
              run_id: runId,
              per_page: 100,
            });

            const failedJobs = jobs.filter(j => ['failure', 'timed_out', 'cancelled', 'action_required'].includes(j.conclusion));

            const hints = {
              'Repo Hygiene Policy': 'Periksa file artifact/temp/docs non-monitoring yang ikut commit.',
              'Release Artifact Policy': 'Periksa whitelist ZIP dan file forbidden yang ikut paket release.',
              'Dependency Vulnerability Scan (Blocking Stage)': 'Cek npm/composer advisory kritikal, lakukan update patch/minor aman.',
              'Secrets Scan (Gitleaks)': 'Rotasi credential jika valid secret, lalu bersihkan history jika perlu.',
              'SAST and Misconfig Scan (Trivy FS)': 'Periksa finding CRITICAL pada misconfig/vulnerability/secret.',
              'Container Image Scan (Trivy)': 'Perbarui base image/paket OS lalu scan ulang.',
              'Deploy to Staging': 'Cek health container + smoke endpoint staging + logs deploy.',
              'Deploy to Production': 'Cek guardrail approval, health container production, smoke production, dan rollback status.',
            };

            const lines = [];
            lines.push('# Ops Triage Summary');
            lines.push('');
            lines.push(`- Workflow: ${runName}`);
            lines.push(`- Conclusion: ${runConclusion}`);
            lines.push(`- Branch: ${headBranch}`);
            lines.push(`- Commit: ${headSha}`);
            lines.push(`- Run URL: ${runUrl}`);
            lines.push('');
            lines.push('## Failed Jobs');
            if (failedJobs.length === 0) {
              lines.push('- No explicit failed job found (check cancelled/infrastructure logs).');
            } else {
              for (const job of failedJobs) {
                lines.push(`- ${job.name} (${job.conclusion})`);
                if (hints[job.name]) {
                  lines.push(`  - Hint: ${hints[job.name]}`);
                }
                lines.push(`  - Job URL: ${job.html_url}`);
              }
            }

            lines.push('');
            lines.push('## Recommended Next Actions');
            lines.push('1. Reproduce failure locally (if possible) for root cause confirmation.');
            lines.push('2. Fix smallest blocking issue first, rerun workflow, then continue to secondary issues.');
            lines.push('3. If deploy failure, run rollback script and capture incident note in DevSecOps Report.');

            require('fs').writeFileSync('ops-triage-summary.md', lines.join('\n'));

      - name: Upload triage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ops-triage-summary-${{ github.event.workflow_run.id }}
          path: ops-triage-summary.md

      - name: Create triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('ops-triage-summary.md', 'utf8');
            const title = `[Ops Triage] ${context.payload.workflow_run.name} failed (${context.payload.workflow_run.conclusion})`;
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ops-triage', 'devops']
              });
            } catch (err) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
            }
