name: Faith Frontend Checks

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'apphosting.yaml'
      - 'components.json'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - '.github/workflows/faith-frontend-checks.yml'
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'apphosting.yaml'
      - 'components.json'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.mjs'
      - 'tsconfig.json'
      - '.github/workflows/faith-frontend-checks.yml'

concurrency:
  group: faith-frontend-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  faith-frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build
