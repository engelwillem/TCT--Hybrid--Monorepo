name: Frontend Production Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Public frontend URL to verify
        required: false
        default: https://www.thechoosentalks.org
  schedule:
    - cron: "17 1 * * *"

concurrency:
  group: frontend-production-smoke
  cancel-in-progress: true

jobs:
  smoke-production:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve base URL
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.base_url }}" ]; then
            echo "base_url=${{ inputs.base_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://www.thechoosentalks.org" >> "$GITHUB_OUTPUT"
          fi

      - name: Run production smoke checks
        shell: bash
        run: |
          BASE_URL="${{ steps.vars.outputs.base_url }}"
          {
            echo "# Frontend Production Smoke Report"
            echo
            echo "- Base URL: ${BASE_URL}"
            echo "- UTC Time: $(date -u +"%Y-%m-%d %H:%M:%S")"
            echo
          } > production-smoke-report.md

          root_code=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 20 "${BASE_URL}/")
          login_code=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 20 "${BASE_URL}/login")

          echo "- GET / => ${root_code}" >> production-smoke-report.md
          echo "- GET /login => ${login_code}" >> production-smoke-report.md

          if [ "${root_code}" != "200" ] && [ "${root_code}" != "301" ] && [ "${root_code}" != "302" ]; then
            echo "Smoke failed: unexpected status for / (${root_code})" >> production-smoke-report.md
            exit 1
          fi

          if [ "${login_code}" != "200" ] && [ "${login_code}" != "301" ] && [ "${login_code}" != "302" ]; then
            echo "Smoke failed: unexpected status for /login (${login_code})" >> production-smoke-report.md
            exit 1
          fi

      - name: Upload smoke report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-production-smoke-report
          path: production-smoke-report.md
