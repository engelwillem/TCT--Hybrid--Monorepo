name: DevSecOps E2E Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "30 2 * * 1"

concurrency:
  group: devsecops-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.ts'
              - 'tsconfig.json'
              - 'vitest.config.ts'
            backend:
              - 'backend-api/**'
              - 'docker/backend/**'
            docker:
              - 'docker/**'
              - 'docker-compose.yml'
            release:
              - 'scripts/create_main_website_zip.py'
              - 'scripts/main-website-zip.whitelist.json'
              - 'scripts/ci-validate-release-artifact.py'
              - '.gitattributes'
              - '.gitignore'
            hygiene:
              - '**/*'

  repo-hygiene:
    name: Repo Hygiene Policy
    needs: changes
    if: needs.changes.outputs.hygiene == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check repo hygiene script
        id: hygiene_script
        shell: bash
        run: |
          if [ -f "scripts/ci-repo-hygiene.ps1" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skip repo hygiene: scripts/ci-repo-hygiene.ps1 not found in this revision."
          fi

      - name: Run repository hygiene check
        if: steps.hygiene_script.outputs.exists == 'true'
        shell: pwsh
        run: ./scripts/ci-repo-hygiene.ps1

  frontend-quality:
    name: Frontend Quality Gate
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Run unit tests (advisory on PR)
        if: github.event_name == 'pull_request'
        run: npm run test:unit
        continue-on-error: true

      - name: Run unit tests (advisory on main/manual/schedule)
        if: github.event_name != 'pull_request'
        run: npm run test:unit
        continue-on-error: true

  backend-quality:
    name: Backend Quality Gate
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend-api
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      VIEW_COMPILED_PATH: /tmp/tct-view-cache
      CACHE_DRIVER: file
      SESSION_DRIVER: file
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: PHP syntax check
        run: |
          find app routes config database -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Today readiness guardrail
        run: composer today:ready
        continue-on-error: true

  secrets-scan:
    name: Secrets Scan (Gitleaks)
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan-advisory:
    name: Dependency Vulnerability Scan (Advisory)
    continue-on-error: true
    needs: changes
    if: github.event_name == 'pull_request' && (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Install backend production dependencies
        run: composer install --working-dir backend-api --no-dev --no-interaction --prefer-dist

      - name: Audit backend dependencies
        run: composer audit --working-dir backend-api --no-dev --format=plain

  dependency-scan-blocking:
    name: Dependency Vulnerability Scan (Blocking Stage)
    continue-on-error: true
    needs: changes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: npm audit (critical only, advisory in gate)
        run: npm audit --omit=dev --audit-level=critical
        continue-on-error: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Install backend production dependencies
        run: composer install --working-dir backend-api --no-dev --no-interaction --prefer-dist --no-scripts

      - name: composer audit (advisory in gate)
        run: composer audit --working-dir backend-api --no-dev --format=plain
        continue-on-error: true

  artifact-policy:
    name: Release Artifact Policy
    continue-on-error: true
    needs: changes
    if: needs.changes.outputs.release == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check artifact policy script
        id: artifact_script
        shell: bash
        run: |
          if [ -f "scripts/ci-validate-release-artifact.py" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skip artifact policy: scripts/ci-validate-release-artifact.py not found in this revision."
          fi

      - name: Validate release artifact policy
        if: steps.artifact_script.outputs.exists == 'true'
        run: python scripts/ci-validate-release-artifact.py

  trivy-fs-scan:
    name: SAST and Misconfig Scan (Trivy FS)
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
        continue-on-error: true

  container-scan:
    name: Container Image Scan (Trivy)
    continue-on-error: true
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Dockerfiles
        id: dockerfiles
        shell: bash
        run: |
          front="false"
          back="false"
          if [ -f "docker/frontend/Dockerfile" ]; then
            front="true"
          fi
          if [ -f "docker/backend/Dockerfile" ]; then
            back="true"
          fi
          echo "has_front=$front" >> "$GITHUB_OUTPUT"
          echo "has_back=$back" >> "$GITHUB_OUTPUT"
          if [ "$front" != "true" ] && [ "$back" != "true" ]; then
            echo "No Dockerfiles found for scan in this revision; skipping container image scan steps."
          fi

      - name: Build frontend image
        if: steps.dockerfiles.outputs.has_front == 'true'
        run: docker build -f docker/frontend/Dockerfile -t tct-frontend:scan .

      - name: Scan frontend image (advisory)
        if: steps.dockerfiles.outputs.has_front == 'true'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: tct-frontend:scan
          format: table
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: "0"

      - name: Build backend image
        if: steps.dockerfiles.outputs.has_back == 'true'
        run: docker build -f docker/backend/Dockerfile -t tct-backend:scan .

      - name: Scan backend image (advisory)
        if: steps.dockerfiles.outputs.has_back == 'true'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: tct-backend:scan
          format: table
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: "0"

  gate-status:
    name: Release Gate Status
    needs:
      - changes
      - repo-hygiene
      - frontend-quality
      - backend-quality
      - secrets-scan
      - artifact-policy
      - trivy-fs-scan
      - container-scan
      - dependency-scan-blocking
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate blocking quality gates
        shell: bash
        run: |
          echo "repo-hygiene=${{ needs.repo-hygiene.result }}"
          echo "frontend-quality=${{ needs.frontend-quality.result }}"
          echo "backend-quality=${{ needs.backend-quality.result }}"
          echo "secrets-scan=${{ needs.secrets-scan.result }}"
          echo "artifact-policy=${{ needs.artifact-policy.result }}"
          echo "trivy-fs-scan=${{ needs.trivy-fs-scan.result }}"
          echo "container-scan=${{ needs.container-scan.result }}"
          echo "dependency-scan-blocking=${{ needs.dependency-scan-blocking.result }}"

          # Allowed statuses for strict gates:
          # - success: executed and passed
          # - skipped: no relevant path changes for this run
          allowed="success skipped"
          # Allowed statuses for advisory gates:
          # - failure is tolerated and surfaced in artifacts/logs
          advisory_allowed="success skipped failure"

          hygiene_ok=false
          frontend_ok=false
          backend_ok=false
          secrets_ok=false
          artifact_ok=false
          trivy_ok=false
          container_ok=false
          deps_ok=false

          for status in $allowed; do
            if [ "${{ needs.repo-hygiene.result }}" = "$status" ]; then
              hygiene_ok=true
            fi
            if [ "${{ needs.frontend-quality.result }}" = "$status" ]; then
              frontend_ok=true
            fi
            if [ "${{ needs.backend-quality.result }}" = "$status" ]; then
              backend_ok=true
            fi
            if [ "${{ needs.artifact-policy.result }}" = "$status" ]; then
              artifact_ok=true
            fi
            if [ "${{ needs.trivy-fs-scan.result }}" = "$status" ]; then
              trivy_ok=true
            fi
          done

          for status in $advisory_allowed; do
            if [ "${{ needs.secrets-scan.result }}" = "$status" ]; then
              secrets_ok=true
            fi
            if [ "${{ needs.artifact-policy.result }}" = "$status" ]; then
              artifact_ok=true
            fi
            if [ "${{ needs.container-scan.result }}" = "$status" ]; then
              container_ok=true
            fi
            if [ "${{ needs.dependency-scan-blocking.result }}" = "$status" ]; then
              deps_ok=true
            fi
          done

          if [ "$hygiene_ok" != "true" ] || [ "$frontend_ok" != "true" ] || [ "$backend_ok" != "true" ] || [ "$secrets_ok" != "true" ] || [ "$artifact_ok" != "true" ] || [ "$trivy_ok" != "true" ] || [ "$container_ok" != "true" ] || [ "$deps_ok" != "true" ]; then
            echo "Blocking quality/security gate failed."
            exit 1
          fi

          echo "Blocking quality and security gates are healthy."

  release-notes-preview:
    name: Release Notes Preview
    needs:
      - gate-status
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes preview
        shell: bash
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            RANGE="$AFTER_SHA~20..$AFTER_SHA"
          else
            RANGE="$BEFORE_SHA..$AFTER_SHA"
          fi

          {
            echo "# Release Notes Preview"
            echo
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Commit range: \`$RANGE\`"
            echo "- Generated at (UTC): $(date -u +"%Y-%m-%d %H:%M:%S")"
            echo
            echo "## Commits"
            git log --no-merges --pretty=format:'- %h %s (%an)' "$RANGE" || true
            echo
            echo
            echo "## Files Changed"
            git diff --name-only "$RANGE" | sed 's/^/- /' || true
          } > release-notes-preview.md

      - name: Upload release notes preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-preview-${{ github.run_id }}
          path: release-notes-preview.md
