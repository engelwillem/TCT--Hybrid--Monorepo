name: Backend Pull Deploy Trigger

on:
  push:
    branches:
      - main
    paths:
      - 'backend-api/**'
      - '.github/workflows/backend-cpanel-deploy.yml'
  workflow_dispatch:

jobs:
  trigger-pull-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Webhook
        run: |
          echo "Triggering pull deployment on cPanel..."
          
          # HTTP Status Code validation
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "HTTP_X_DEPLOY_TOKEN: ${{ secrets.DEPLOY_SECRET_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.WEBHOOK_URL }}")
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Successfully queued pull deployment over HTTPS!"
          else
            echo "::error::Webhook trigger failed with status code $HTTP_STATUS."
            exit 1
          fi
