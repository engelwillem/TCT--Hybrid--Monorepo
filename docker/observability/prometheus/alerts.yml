groups:
  - name: tct-availability
    rules:
      - alert: TCTServiceDown
        expr: probe_success{job="blackbox-http"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service down: {{ $labels.target_name }}"
          description: "HTTP probe failed for {{ $labels.instance }} for more than 2 minutes."

      - alert: TCTContainerDown
        expr: probe_success{job="blackbox-tcp"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container endpoint down: {{ $labels.container }}"
          description: "TCP probe to {{ $labels.instance }} failed for more than 2 minutes."

  - name: tct-latency
    rules:
      - alert: TCTHighLatencyP95
        expr: quantile_over_time(0.95, probe_duration_seconds{job="blackbox-http"}[10m]) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency: {{ $labels.target_name }}"
          description: "p95 HTTP probe latency over 10m is above 2 seconds for {{ $labels.instance }}."

  - name: tct-error-rate
    rules:
      - alert: TCTHighErrorRate
        expr: (1 - avg_over_time(probe_success{job="blackbox-http"}[10m])) * 100 > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate: {{ $labels.target_name }}"
          description: "HTTP probe error rate over 10m is above 5% for {{ $labels.instance }}."

  - name: tct-slo
    rules:
      - alert: TCTSLOAvailabilityBurn
        expr: avg_over_time(probe_success{job="blackbox-http"}[30m]) < 0.995
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "SLO availability burn detected: {{ $labels.target_name }}"
          description: "30-minute availability dropped below 99.5% for {{ $labels.instance }}."
