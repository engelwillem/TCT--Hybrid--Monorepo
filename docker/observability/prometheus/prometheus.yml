global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://frontend:9002/api/today/readiness
        labels:
          target_name: frontend-readiness
          service: frontend
      - targets:
          - http://backend:8000/api/v1/community/posts
        labels:
          target_name: backend-readiness
          service: backend
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets: ["frontend:9002"]
        labels:
          container: tct-frontend
      - targets: ["backend:8000"]
        labels:
          container: tct-backend
      - targets: ["mariadb:3306"]
        labels:
          container: tct-mariadb
      - targets: ["redis:6379"]
        labels:
          container: tct-redis
      - targets: ["mailpit:1025"]
        labels:
          container: tct-mailpit
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
