services:
  mariadb:
    image: mariadb:11.4
    container_name: tct-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: thechoosentalks
      MARIADB_USER: tct
      MARIADB_PASSWORD: tct
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-proot"]
      start_period: 5m
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tct-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: tct-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: tct-backend
    restart: unless-stopped
    working_dir: /workspace/backend-api
    env_file:
      - ${BACKEND_ENV_FILE:-backend-api/.env.docker}
    volumes:
      - .:/workspace
      - backend_vendor:/workspace/backend-api/vendor
      - ./${BACKEND_ENV_FILE:-backend-api/.env.docker}:/workspace/backend-api/.env:ro
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "30", "http://127.0.0.1:8000/up"]
      start_period: 10m
      interval: 20s
      timeout: 35s
      retries: 10
    command: ["bash", "/workspace/docker/backend/start.sh"]

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: tct-frontend
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - ${FRONTEND_ENV_FILE:-.env.docker}
    environment:
      CHOKIDAR_USEPOLLING: ${FRONTEND_USE_POLLING:-false}
      WATCHPACK_POLLING: ${FRONTEND_USE_POLLING:-false}
      NEXT_TELEMETRY_DISABLED: "1"
      FRONTEND_RUNTIME: ${FRONTEND_RUNTIME:-development}
      FRONTEND_RESET_CACHE: ${FRONTEND_RESET_CACHE:-0}
    volumes:
      - .:/workspace
      - frontend_node_modules:/workspace/node_modules
      - frontend_next:/workspace/.next
      - ./${FRONTEND_ENV_FILE:-.env.docker}:/workspace/.env.local:ro
    ports:
      - "9002:9002"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "10", "http://127.0.0.1:9002/favicon.svg"]
      start_period: 10m
      interval: 20s
      timeout: 12s
      retries: 10
    command: ["bash", "/workspace/docker/frontend/start.sh"]

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: tct-blackbox-exporter
    restart: unless-stopped
    ports:
      - "9115:9115"
    volumes:
      - ./docker/observability/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tct-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      blackbox-exporter:
        condition: service_started
      alertmanager:
        condition: service_started
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: tct-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./docker/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tct-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  mariadb_data:
  redis_data:
  backend_vendor:
  frontend_node_modules:
  frontend_next:
  prometheus_data:
  grafana_data:
